name: E2E Testing

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - .gitignore
      - LICENSE
      - "worker/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - .gitignore
      - LICENSE
      - "worker/**"

jobs:
  test:
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium with dependencies
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npm test