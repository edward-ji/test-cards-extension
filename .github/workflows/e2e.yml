name: E2E Testing

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - .gitignore
      - LICENSE
      - "worker/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - .gitignore
      - LICENSE
      - "worker/**"

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
      - name: Run E2E tests
        run: npm test
